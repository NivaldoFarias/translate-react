name: Poll upstream React docs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Poll only; do not start translation
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: upstream-poll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  poll:
    name: Detect upstream changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.poll.outputs.has_changes }}
      matrix: ${{ steps.poll.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3' }}

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Poll upstream SHAs
        id: poll
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: bun run ci:poll-upstream

  translate:
    name: Run translation
    needs: poll
    if: needs.poll.outputs.has_changes == 'true' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
    uses: ./.github/workflows/workflow.yml
    with:
      matrix_json: ${{ needs.poll.outputs.matrix }}
      environment: production
    secrets: inherit
