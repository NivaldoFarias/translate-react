name: Run Translation Workflow

on:
  workflow_call:
    inputs:
      matrix_json:
        description: JSON array of translation matrix rows from upstream poll
        required: true
        type: string
      environment:
        description: GitHub Environment for secrets and protection rules
        required: false
        type: string
        default: production
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - development
          - production
        default: development
      langs:
        description: Comma-separated locale ids (empty = all configured upstream locales)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  prepare-matrix:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.publish.outputs.matrix }}
      has_matrix: ${{ steps.publish.outputs.has_matrix }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun dependencies
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-bun-deps
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.14' }}

      - name: Generate Bot Token
        if: github.event_name == 'workflow_dispatch'
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve matrix for manual run
        if: github.event_name == 'workflow_dispatch'
        id: resolve
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: bun run ci:resolve-matrix --langs "${{ inputs.langs }}"

      - name: Publish matrix outputs
        id: publish
        env:
          POLLED_MATRIX: ${{ inputs.matrix_json }}
          RESOLVED_MATRIX: ${{ steps.resolve.outputs.matrix }}
          RESOLVED_HAS_MATRIX: ${{ steps.resolve.outputs.has_matrix }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            MATRIX="$POLLED_MATRIX"
            HAS_MATRIX="true"
          else
            MATRIX="$RESOLVED_MATRIX"
            HAS_MATRIX="$RESOLVED_HAS_MATRIX"
          fi

          {
            echo "matrix<<EOFMATRIX"
            echo "$MATRIX"
            echo "EOFMATRIX"
          } >> "$GITHUB_OUTPUT"
          echo "has_matrix=$HAS_MATRIX" >> "$GITHUB_OUTPUT"

  workflow:
    name: Sync & Translate
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_matrix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 130
    environment: ${{ inputs.environment || 'production' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    concurrency:
      group: translation-${{ matrix.lang }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout main repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.14' }}

      - name: Run translation workflow (${{ matrix.lang }})
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_TO_CONSOLE: ${{ vars.LOG_TO_CONSOLE }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_BASE_URL: ${{ vars.LLM_API_BASE_URL }}
          MAX_RETRY_ATTEMPTS: ${{ vars.MAX_RETRY_ATTEMPTS }}
          MAX_LLM_CONCURRENCY: ${{ vars.MAX_LLM_CONCURRENCY }}
          OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
          GH_REQUEST_TIMEOUT: ${{ vars.GH_REQUEST_TIMEOUT }}
          HEADER_APP_URL: ${{ vars.HEADER_APP_URL }}
          HEADER_APP_TITLE: ${{ vars.HEADER_APP_TITLE }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTIONS: true
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          ARGS=(
            --lang "${{ matrix.lang }}"
            --fork-owner "${{ matrix.fork_owner }}"
            --fork-name "${{ matrix.fork_name }}"
            --upstream-owner "${{ matrix.upstream_owner }}"
            --upstream-name "${{ matrix.upstream_name }}"
          )
          if [ -n "${{ matrix.translation_guidelines_file }}" ]; then
            ARGS+=(--translation-guidelines-file "${{ matrix.translation_guidelines_file }}")
          fi
          bun run start -- "${ARGS[@]}"
        timeout-minutes: 120

      - name: Record upstream SHA (${{ matrix.lang }})
        if: success()
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          VAR_NAME="UPSTREAM_SHA_$(echo '${{ matrix.lang }}' | tr '[:lower:]' '[:upper:]' | tr '-' '_')"
          gh variable set "$VAR_NAME" --body "${{ matrix.upstream_sha }}"

      - name: Upload logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: translation-logs-${{ matrix.lang }}-${{ github.run_id }}
          path: logs/
          retention-days: 90
