name: Run Translation Workflow

on:
  workflow_call:
    inputs:
      matrix_json:
        description: JSON array of translation matrix rows from upstream poll
        required: true
        type: string
      environment:
        description: GitHub Environment for secrets and protection rules
        required: false
        type: string
        default: production
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - development
          - production
        default: development
      langs:
        description: Comma-separated locale ids (empty = all configured upstream locales)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

concurrency:
  group: translation-${{ inputs.langs }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.publish.outputs.matrix }}
      has_matrix: ${{ steps.publish.outputs.has_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3' }}

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Use polled matrix
        if: github.event_name == 'workflow_call'
        id: polled
        run: |
          echo "matrix=${{ inputs.matrix_json }}" >> "$GITHUB_OUTPUT"
          echo "has_matrix=true" >> "$GITHUB_OUTPUT"

      - name: Resolve matrix for manual run
        if: github.event_name == 'workflow_dispatch'
        id: resolve
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: bun run ci:resolve-matrix --langs "${{ inputs.langs }}"

      - name: Publish matrix outputs
        id: publish
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "matrix=${{ steps.polled.outputs.matrix }}" >> "$GITHUB_OUTPUT"
            echo "has_matrix=${{ steps.polled.outputs.has_matrix }}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=${{ steps.resolve.outputs.matrix }}" >> "$GITHUB_OUTPUT"
            echo "has_matrix=${{ steps.resolve.outputs.has_matrix }}" >> "$GITHUB_OUTPUT"
          fi

  workflow:
    name: Sync & Translate
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_matrix == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3' }}

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Create `.env` file
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_TO_CONSOLE: ${{ vars.LOG_TO_CONSOLE }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_BASE_URL: ${{ vars.LLM_API_BASE_URL }}
          MAX_RETRY_ATTEMPTS: ${{ vars.MAX_RETRY_ATTEMPTS }}
          MAX_LLM_CONCURRENCY: ${{ vars.MAX_LLM_CONCURRENCY }}
          OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
          GH_REQUEST_TIMEOUT: ${{ vars.GH_REQUEST_TIMEOUT }}
          HEADER_APP_URL: ${{ vars.HEADER_APP_URL }}
          HEADER_APP_TITLE: ${{ vars.HEADER_APP_TITLE }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          cat > .env << EOF
          GH_TOKEN=${{ steps.generate-token.outputs.token }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          TARGET_LANGUAGE=${{ matrix.lang }}
          REPO_FORK_OWNER=${{ matrix.fork_owner }}
          REPO_FORK_NAME=${{ matrix.fork_name }}
          REPO_UPSTREAM_OWNER=${{ matrix.upstream_owner }}
          REPO_UPSTREAM_NAME=${{ matrix.upstream_name }}
          EOF

          [ -n "$NODE_ENV" ] && echo "NODE_ENV=$NODE_ENV" >> .env || true
          [ -n "$LOG_LEVEL" ] && echo "LOG_LEVEL=$LOG_LEVEL" >> .env || true
          [ -n "$LOG_TO_CONSOLE" ] && echo "LOG_TO_CONSOLE=$LOG_TO_CONSOLE" >> .env || true
          [ -n "$LLM_MODEL" ] && echo "LLM_MODEL=$LLM_MODEL" >> .env || true
          [ -n "$LLM_API_BASE_URL" ] && echo "LLM_API_BASE_URL=$LLM_API_BASE_URL" >> .env || true
          [ -n "$MAX_RETRY_ATTEMPTS" ] && echo "MAX_RETRY_ATTEMPTS=$MAX_RETRY_ATTEMPTS" >> .env || true
          [ -n "$MAX_LLM_CONCURRENCY" ] && echo "MAX_LLM_CONCURRENCY=$MAX_LLM_CONCURRENCY" >> .env || true
          [ -n "$OPENAI_PROJECT_ID" ] && echo "OPENAI_PROJECT_ID=$OPENAI_PROJECT_ID" >> .env || true
          [ -n "$GH_PAT_TOKEN" ] && echo "GH_PAT_TOKEN=$GH_PAT_TOKEN" >> .env || true
          [ -n "$MAX_TOKENS" ] && echo "MAX_TOKENS=$MAX_TOKENS" >> .env || true
          [ -n "$BATCH_SIZE" ] && echo "BATCH_SIZE=$BATCH_SIZE" >> .env || true
          [ -n "$GH_REQUEST_TIMEOUT" ] && echo "GH_REQUEST_TIMEOUT=$GH_REQUEST_TIMEOUT" >> .env || true
          [ -n "$HEADER_APP_URL" ] && echo "HEADER_APP_URL=$HEADER_APP_URL" >> .env || true
          [ -n "$HEADER_APP_TITLE" ] && echo "HEADER_APP_TITLE=$HEADER_APP_TITLE" >> .env || true
          [ -n "${{ matrix.translation_guidelines_file }}" ] && echo "TRANSLATION_GUIDELINES_FILE=${{ matrix.translation_guidelines_file }}" >> .env || true
          echo "GITHUB_REF=${GITHUB_REF}" >> .env
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}" >> .env

      - name: Run translation workflow (${{ matrix.lang }})
        run: bun run start
        timeout-minutes: 120

      - name: Record upstream SHA (${{ matrix.lang }})
        if: success()
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          VAR_NAME="UPSTREAM_SHA_$(echo '${{ matrix.lang }}' | tr '[:lower:]' '[:upper:]' | tr '-' '_')"
          gh variable set "$VAR_NAME" --body "${{ matrix.upstream_sha }}"

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: translation-logs-${{ matrix.lang }}-${{ github.run_id }}
          path: logs/
          retention-days: 7
