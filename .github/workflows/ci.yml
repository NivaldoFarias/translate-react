name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint, Check Formatting, and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.14' }}

      - name: Verify CHANGELOG.md lists current package version
        run: bun run ci:verify-changelog

      - name: Run linter
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Run type checker
        run: bun run type-check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun dependencies
        uses: ./.github/actions/setup-bun-deps
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.14' }}

      - name: Run tests
        run: bun run test
