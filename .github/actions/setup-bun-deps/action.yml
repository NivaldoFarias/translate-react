name: Setup Bun dependencies
description: Install Bun and restore node_modules from bun.lock cache

inputs:
  bun-version:
    description: Bun version (repository variable BUN_VERSION when unset)
    required: false
    default: "1.3.14"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache node_modules
      id: cache-deps
      uses: actions/cache@v5
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          node-modules-${{ runner.os }}-

    - name: Install dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: bun install --frozen-lockfile
