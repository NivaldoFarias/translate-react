# git-cliff configuration
# Generates a mechanical Keep a Changelog draft from Conventional Commits since
# the last tag. The output is a starting point for the `## [Unreleased]` section;
# git-cliff never writes `CHANGELOG.md` directly (see the `release:draft` script).
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# Render only the grouped body; CHANGELOG.md keeps its own header and footer links.
# Group names carry a `<!-- N -->` index so they render in Keep a Changelog order
# (group_by sorts keys); `striptags` removes the marker before display.
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}`{{ commit.scope }}`: {% endif %}{{ commit.message | upper_first | trim }}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = true
topo_order = false
sort_commits = "oldest"

# Map commits to the six Keep a Changelog sections; first match wins.
# Conventional parsing strips the `type(scope):` prefix from `commit.message`,
# so type rules match the raw type while the template re-adds the backticked scope.
# Deprecated/Removed/Security have no dedicated Conventional type, so they are
# detected from the scope or the leading verb. These are heuristics for a draft;
# move entries between sections as needed before release.
commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore: draft changelog", skip = true },
  { message = "^chore.*: bump version", skip = true },

  { message = "(?i)^\\w+\\([^)]*security[^)]*\\)", group = "<!-- 5 -->Security" },
  { message = "(?i)^\\w+(\\([^)]*\\))?!?:\\s+deprecat", group = "<!-- 2 -->Deprecated" },
  { message = "(?i)^\\w+(\\([^)]*\\))?!?:\\s+(remove|delete|drop)", group = "<!-- 3 -->Removed" },

  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 4 -->Fixed" },
  { message = "^(refactor|perf|docs|style|test|ci|build|chore)", group = "<!-- 1 -->Changed" },
  { message = ".*", group = "<!-- 1 -->Changed" },
]

tag_pattern = "v[0-9]*"
